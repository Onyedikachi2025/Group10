<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Account - TUD</title>
  </head>
<body>

  <div class="form-container">
    <header>
      <h1>Close Account</h1>
    </header>
    <form onsubmit="return confirm('Are you sure?')">
      <div class="input-group">
        <label>Confirm Email</label>
        <input type="email" name="email" required />
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" name="password" required />
      </div>

      <button type="submit" class="delete-btn">
        <span>Delete My Account</span>
      </button>

      <div class="footer-text">
        <a href="login.html">Back to Login</a>
      </div>
    </form>
  </div>

</body>
</html>
<style>
  body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background-color: #f8f8f8; 
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.form-container {
  width: 100%;
  max-width: 500px;
  padding: 40px;
  text-align: center;
}

header h1 {
  color: #000000;
  font-size: 42px;
  font-weight: bold;
  margin-bottom: 40px;
  text-align: left;
}

.input-group {
  margin-bottom: 30px;
  text-align: left;
}

label {
  display: block;
  color: #333;
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 12px;
  margin-left: 10px;
}

input {
  width: 100%;
  padding: 22px 30px;
  border: 1px solid #dcdcdc;
  border-radius: 50px; 
  box-sizing: border-box;
  font-size: 18px;
  background-color: #eff4fb;
  outline: none;
}

input:focus {
  border-color: #bcd9e5;
  background-color: white;
}

button.delete-btn {
  width: 100%;
  background-color: #bcd9e5; 
  border: none;
  border-radius: 50px;
  padding: 20px;
  cursor: pointer;
  margin-top: 10px;
  font-size: 22px;
  font-weight: bold;
  color: #333;
  transition: 0.2s;
}

button.delete-btn:hover {
  background-color: #a8c8d6;
}

.footer-text {
  margin-top: 40px;
}

.footer-text a {
  color: #666;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
}

.footer-text a:hover {
  color: #000;
}
</style>
