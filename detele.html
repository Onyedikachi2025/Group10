<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Account - TUD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="form-container">
    <header>
      <h1>Close Account</h1>
      <p class="subtitle warning">This action is permanent. Please enter your credentials to confirm.</p>
    </header>
    
    <form>
      <div class="input-group">
        <input type="text" id="username" name="username" placeholder="Confirm Username" required />
      </div>

      <div class="input-group">
        <input type="password" id="password" name="password" placeholder="Confirm Password" required />
      </div>

      <button type="submit" class="delete-btn">Delete My Account</button>

      <div class="footer-text">
        Changed your mind? <a href="login.html">Go back to Login</a>
      </p>
    </form>
  </div>

</body>
</html>
