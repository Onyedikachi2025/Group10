<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Password</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-container">
      <header>
        <h1>Update Password</h1>
      </header>

      <form id="passwordForm" onsubmit="updatePassword(event)">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" required />

        <label for="confirm-password">Confirm New Password</label>
        <input type="password" id="confirm-password" required />

        <button type="submit">Update Password</button>
      </form>

      <div class="login-link">
        <a href="login.html">Back to Login</a>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      const supabase = window.supabase.createClient(
        "https://eayrzuoieurtabsomrdo.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVheXJ6dW9pZXVydGFic29tcmRvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE4MzkxMSwiZXhwIjoyMDg4NzU5OTExfQ.Q1cu2iGedOfIdnYMZ5r1faSBbx630RmTx_GTEpst3BM"
      );

      async function updatePassword(event) {
        event.preventDefault();

        const newPassword = document.getElementById("new-password").value;
        const confirmPassword =
          document.getElementById("confirm-password").value;

        if (newPassword !== confirmPassword) {
          alert("Passwords do not match");
          return;
        }

        const email = prompt("Enter your email:");

        const { error } = await supabase
          .from("users")
          .update({ password: newPassword })
          .eq("email", email);

        if (error) {
          alert(error.message);
        } else {
          alert("Password updated!");
        }
      }
    </script>
  </body>
</html>
