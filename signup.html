<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_ANON_KEY"
);

async function handleSubmit() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const birthday = document.getElementById("Date Of Brith").value;
  const username = document.getElementById("user_name").value;

  if (!email || !password || !username) {
    alert("Please fill all required fields");
    return;
  }

  const { data, error } = await supabase
    .from('users')
    .insert([
      {
        user_name: username,
        email: email
      }
    ]);

  if (error) {
    console.log(error);
    alert("Error: " + error.message);
  } else {
    alert("Account created!");

    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    document.getElementById("Date of Brith").value = "";
    document.getElementById("user_name").value = "";
  }
}
</script>
  
  <body>
    <form>
    <header>
    <h1>Tallaght Uni</h1>
    </header>
      <label for="Email address">Moblie Number or Email Address</label>
      <input type="text" id="email" name="email" placeholder="Email Address" required/>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required/>

      <label for="birthday">Date of brith</label>
      <input type="date" required>

      <label for="Username">Username</label>
      <input type="text" id="name" name="name" placeholder="Username" required/>

      <button onclick="handleSubmit()">Submit</button>
      </form>

    <p class="login-link">
      <a href="loginin.html">I already have an account</a>
    </p>
    </div>
    <footer>
    <footer>
  </body>
</html>
