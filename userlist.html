<!DOCTYPE html>
<html lang="en">
<head>
  <title>Users List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<h1>Users Information List</h1>
<button onclick="loadUsers()">Fetch Data</button>
<table id="userTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td colspan="3">Loading data…</td>
    </tr>
  </tbody>
</table>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eayrzuoieurtabsomrdo.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVheXJ6dW9pZXVydGFic29tcmRvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE4MzkxMSwiZXhwIjoyMDg4NzU5OTExfQ.Q1cu2iGedOfIdnYMZ5r1faSBbx630RmTx_GTEpst3BM";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadUsers() {
  const { data, error } = await supabase
    .from('users')
    .select('user_id, user_name, email')
    .order("user_id", { ascending: true });

  const tableBody = document.querySelector("#userTable tbody");

  if (error) {
    console.error(error);
    tableBody.innerHTML = "<tr><td colspan='3'>Error loading data</td></tr>";
    return;
  }

  tableBody.innerHTML = "";

  data.forEach(user => {
    const row = `
      <tr>
        <td>${user.user_id ?? ""}</td>
        <td>${user.user_name}</td>
        <td>${user.email}</td>
      </tr>
    `;
    tableBody.innerHTML += row;
  });
}
loadUsers();
</script>

</body>
</html>
